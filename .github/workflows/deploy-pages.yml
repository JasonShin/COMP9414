name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate index page
        run: |
          python3 - << 'PYEOF'
          import glob, re, html

          pages = sorted(glob.glob("week*/index.html")) + sorted(glob.glob("assignment*/index.html"))
          links = ""
          for path in pages:
              folder = path.split("/")[0]
              with open(path) as f:
                  content = f.read()
              m = re.search(r"<title>(.*?)</title>", content)
              title = html.escape(m.group(1)) if m else folder.replace("_", " ").title()
              links += f'<a class="week-link" href="{folder}/">{title}<span>{folder}</span></a>\n'

          if not links:
              links = '<p style="text-align:center;color:#888">No weeks published yet.</p>'

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>COMP9414 Study Notes</title>
              <style>
                  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                  body {{
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: #0f0f23;
                      color: #e0e0e0;
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                  }}
                  .container {{ max-width: 600px; width: 100%; padding: 20px; }}
                  h1 {{ text-align: center; color: #7cb7ff; margin-bottom: 8px; font-size: 1.8rem; }}
                  .subtitle {{ text-align: center; color: #888; margin-bottom: 32px; }}
                  .week-list {{ display: flex; flex-direction: column; gap: 12px; }}
                  .week-link {{
                      display: block;
                      padding: 18px 24px;
                      background: #1a1a3e;
                      border: 1px solid #2a2a5a;
                      border-radius: 12px;
                      color: #7cb7ff;
                      text-decoration: none;
                      font-size: 1.1rem;
                      transition: all 0.2s;
                  }}
                  .week-link:hover {{ border-color: #7cb7ff; background: #1a2a4a; }}
                  .week-link span {{ color: #888; font-size: 0.85rem; display: block; margin-top: 4px; }}
              </style>
          </head>
          <body>
          <div class="container">
              <h1>COMP9414 Study Notes</h1>
              <p class="subtitle">AI Foundations - UNSW</p>
              <div class="week-list">
                  {links}
              </div>
          </div>
          </body>
          </html>"""

          with open("index.html", "w") as f:
              f.write(page)

          print("Generated index.html with entries:", [p.split("/")[0] for p in pages])
          PYEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
