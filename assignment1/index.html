        /* Score */

        /* Topic section in browse mode */

        @media (max-width: 600px) {
            .container { padding: 12px; }

<div class="container">
    <header>
        <h1>Assignment 1: Discussion Prep</h1>
        <p>Search & Planning - 72 questions across 3 discussion groups (includes deep understanding)</p>
        <a href="study.html" style="display:inline-block;margin-top:12px;padding:8px 20px;border-radius:8px;background:#a78bfa;color:#0f0f23;text-decoration:none;font-size:0.9rem;font-weight:600;transition:background 0.2s;" onmouseover="this.style.background='#8b5cf6'" onmouseout="this.style.background='#a78bfa'">Interactive Study Guide</a>

<script>
// ==================== QUIZ DATA ====================
const questions = [
    // ===== GROUP 1: FOUNDATIONS (20 questions) =====
    // Problem formulation
    {
        topic: "foundations",
        category: "Problem Formulation",
        question: "What are the five components needed to define a search problem?",
        options: [
            "Graph, nodes, edges, weights, heuristic",
            "Initial state, successor function, goal test, path cost, strategy",
            "Start, frontier, explored set, solution, cost",
            "States, actions, transitions, rewards, policy"
        ],
        correct: 1,
        explanation: "A search problem requires: (1) initial state, (2) successor function / actions, (3) goal test, (4) path cost, and (5) a strategy for choosing the next frontier node."
    },
    {
        topic: "foundations",
        category: "Problem Formulation",
        question: "For the office graph (corridor, mail_room, office_a, office_b, storage, lab), what is the problem formulation for finding a path from corridor to lab?",
        options: [
            "Initial: corridor, Goal: state == lab, Actions: move along edges, Cost: sum of edge weights",
            "Initial: lab, Goal: state == corridor, Actions: move along edges, Cost: number of edges",
            "Initial: corridor, Goal: all rooms visited, Actions: move along edges, Cost: sum of edge weights",
            "Initial: corridor, Goal: state == lab, Actions: move to any room, Cost: 1 per move"
        ],
        correct: 0,
        explanation: "The formulation is: initial state = corridor, goal test = (state == lab), actions = move along any edge to an adjacent room (bidirectional), path cost = sum of edge costs along the path."
    },
    {
        topic: "foundations",
        category: "Problem Formulation",
        question: "In the office graph, why can BFS and UCS return different paths?",
        options: [
            "BFS is not a valid algorithm for weighted graphs",
            "BFS finds the shallowest path (fewest edges), UCS finds the cheapest path (lowest cost). These differ when edge costs vary.",
            "UCS uses a heuristic, BFS does not",
            "BFS explores more nodes than UCS"
        ],
        correct: 1,
        explanation: "BFS finds corridor -> office_a -> lab (2 edges, cost 10). UCS finds corridor -> office_b -> lab (2 edges, cost 6). BFS picks the shallowest; UCS picks the cheapest. They agree only when all edge costs are equal."
    },
    // State space vs search tree
    {
        topic: "foundations",
        category: "State Space vs Search Tree",
        question: "What is the key difference between a state space graph and a search tree?",
        options: [
            "The state space graph has weights, the search tree does not",
            "In the state space graph each state appears once; in the search tree the same state can appear multiple times via different paths",
            "The search tree is always smaller than the state space graph",
            "The state space graph is directed, the search tree is undirected"
        ],
        correct: 1,
        explanation: "State space graph: each room appears exactly once as a node (6 nodes for the office). Search tree: each node represents a state + the path to reach it, so the same room can appear multiple times because there are multiple paths to reach it."
    },
    {
        topic: "foundations",
        category: "State Space vs Search Tree",
        question: "In the office graph (6 rooms, 8 edges), how many nodes does the state space graph have? Could the search tree have more?",
        options: [
            "6 nodes; no, the tree is always the same size",
            "6 nodes; yes, the tree can be much larger since each path-to-a-state is a separate tree node",
            "8 nodes (one per edge); the tree has 6 nodes",
            "Infinite nodes in both"
        ],
        correct: 1,
        explanation: "The state space graph has exactly 6 nodes (one per room). The search tree can have many more since each unique path creates a new node. For example, corridor->mail_room->storage and corridor->office_a->office_b->storage both have 'storage' as a tree node, but they're different tree nodes with different paths."
    },
    {
        topic: "foundations",
        category: "State Space vs Search Tree",
        question: "Why does graph search need a visited/explored set, but tree search does not?",
        options: [
            "Tree search is faster so it doesn't need optimisation",
            "Graph search could revisit states infinitely (cycles); the explored set prevents re-expanding the same state",
            "Tree search already has a heuristic built in",
            "The explored set only matters for A*"
        ],
        correct: 1,
        explanation: "Without an explored set, graph search can loop forever revisiting the same states (e.g., corridor -> mail_room -> corridor -> mail_room ...). The explored set ensures each state is expanded at most once. Tree search by definition doesn't check, but risks infinite loops."
    },
    // Frontier and explored set
    {
        topic: "foundations",
        category: "Frontier & Explored Set",
        question: "What is the frontier (fringe) in graph search?",
        options: [
            "All states that have already been expanded",
            "The set of discovered but not-yet-expanded states awaiting processing",
            "The final solution path",
            "All edges in the graph"
        ],
        correct: 1,
        explanation: "The frontier holds states that have been generated (discovered) but not yet expanded. The search algorithm picks which frontier node to expand next based on its strategy (LIFO for DFS, FIFO for BFS, min-cost for UCS, min f(n) for A*)."
    },
    {
        topic: "foundations",
        category: "Frontier & Explored Set",
        question: "A node moves from frontier to explored set when:",
        options: [
            "It is first discovered as a neighbour",
            "It is removed from the frontier and its neighbours are generated (expanded)",
            "It is identified as the goal",
            "Its heuristic value is computed"
        ],
        correct: 1,
        explanation: "A node moves from frontier to explored when it is popped (removed) from the frontier and expanded. 'Expanded' means we generate its successors. The node is then in the explored/visited set and will never be expanded again."
    },
    {
        topic: "foundations",
        category: "Frontier & Explored Set",
        question: "What happens if UCS pops a node from the frontier that is already in the explored set?",
        options: [
            "It expands it again with the new cost",
            "It skips the node (this is a stale entry) and pops the next one",
            "It removes the node from the explored set and re-expands it",
            "This can never happen in UCS"
        ],
        correct: 1,
        explanation: "In UCS with lazy deletion, stale heap entries can exist. When we pop a node that's already visited, we skip it because its optimal cost was already found when it was first popped. This is the 'if node in visited: continue' check in the code."
    },
    {
        topic: "foundations",
        category: "Frontier & Explored Set",
        question: "What is the difference between 'generated' and 'expanded' in search metrics?",
        options: [
            "They mean the same thing",
            "Generated = created and added to the frontier; Expanded = removed from frontier and successors generated",
            "Generated = only the goal node; Expanded = all other nodes",
            "Generated = nodes in the explored set; Expanded = nodes still in the frontier"
        ],
        correct: 1,
        explanation: "Generated count = total nodes added to the frontier (including stale duplicates in UCS/A*). Expanded count = nodes popped from the frontier and processed. Generated >= Expanded always. The difference shows how much 'wasted' work the frontier contains."
    },
    // Deterministic tie-breaking
    {
        topic: "foundations",
        category: "Deterministic Tie-Breaking",
        question: "Why does the assignment require deterministic tie-breaking?",
        options: [
            "To make the algorithm faster",
            "To ensure reproducible results: every run on the same input produces the same expansion order",
            "To reduce memory usage",
            "To guarantee optimal solutions"
        ],
        correct: 1,
        explanation: "Deterministic tie-breaking ensures that the tutor can verify your results. If ties were broken randomly, each run could produce a different expansion order, making it impossible to check correctness. The assignment specifies alphabetical order for successor generation."
    },
    {
        topic: "foundations",
        category: "Deterministic Tie-Breaking",
        question: "How does DFS break ties when multiple unvisited neighbours exist?",
        options: [
            "Picks randomly",
            "Picks the one with lowest cost",
            "Generates successors in alphabetical order so the alphabetically first unvisited neighbour is explored next",
            "Picks the one closest to the goal"
        ],
        correct: 2,
        explanation: "DFS generates successors in alphabetical order (sorted adjacency list). Since DFS uses a stack, it takes the FIRST unvisited neighbour from the sorted list and goes deeper immediately."
    },
    {
        topic: "foundations",
        category: "Deterministic Tie-Breaking",
        question: "For UCS and A*, when two frontier entries have the same priority, how should ties be broken?",
        options: [
            "Random choice",
            "Alphabetical by node ID",
            "Compare complete path tuples lexicographically; if still tied, keep the entry inserted first (FIFO)",
            "Always expand the deeper node"
        ],
        correct: 2,
        explanation: "The assignment specifies: if two frontier entries have the same primary priority value, compare the complete path tuples lexicographically. If there is still a tie, keep the entry that was inserted first."
    },
    {
        topic: "foundations",
        category: "Deterministic Tie-Breaking",
        question: "In your DFS implementation, what data structure determines which neighbour to visit first?",
        options: [
            "A min-heap sorted by cost",
            "A queue (FIFO)",
            "A sorted adjacency list — neighbours are sorted alphabetically, and DFS picks the first unvisited one",
            "A random shuffle of neighbours"
        ],
        correct: 2,
        explanation: "The adjacency list is sorted alphabetically: adjacency[node_id].sort(). DFS iterates through this sorted list and picks the first unvisited neighbour, ensuring deterministic exploration order."
    },
    // Metrics
    {
        topic: "foundations",
        category: "Search Metrics",
        question: "What does 'frontier_peak' measure?",
        options: [
            "The total number of nodes ever in the frontier",
            "The maximum size of the frontier at any single point during the search",
            "The size of the frontier when the goal is found",
            "The number of times the frontier was empty"
        ],
        correct: 1,
        explanation: "frontier_peak = max(len(frontier)) taken at each iteration. It measures the worst-case memory usage of the frontier during the entire search, not just at the end."
    },
    {
        topic: "foundations",
        category: "Search Metrics",
        question: "Why might generated_count be larger than expanded_count in UCS?",
        options: [
            "UCS has a bug",
            "UCS pushes a new heap entry every time a cheaper path is found, creating stale entries that are never expanded",
            "UCS expands each node multiple times",
            "Generated count includes the start node, expanded count doesn't"
        ],
        correct: 1,
        explanation: "UCS uses lazy deletion: when a shorter path to a node is found, a new entry is pushed to the heap. The old entry becomes stale. When the stale entry is eventually popped, it's skipped (already visited). So generated > expanded due to these stale entries."
    },
    {
        topic: "foundations",
        category: "Problem Formulation",
        question: "When is the goal test performed in UCS/A*?",
        options: [
            "When the node is first generated (added to frontier)",
            "When the node is popped from the frontier (expanded)",
            "Before adding neighbours to the frontier",
            "After all nodes have been expanded"
        ],
        correct: 1,
        explanation: "UCS and A* check the goal on POP (expansion), not on generation. This is because the first time a node is generated, it might not have the optimal cost yet. Only when popped is the cost guaranteed optimal (for admissible heuristics in A*)."
    },
    {
        topic: "foundations",
        category: "Problem Formulation",
        question: "For BFS, where is the goal test performed?",
        options: [
            "Only when popped from the queue",
            "Either when generated or when popped works for BFS, but the assignment uses goal-check on pop",
            "Only when generated",
            "After all nodes at the current depth are expanded"
        ],
        correct: 1,
        explanation: "BFS can check the goal either on generation or on expansion and still find the shallowest path. The assignment implementation checks on pop (dequeue) for consistency with UCS/A*. Checking on generation would be faster but doesn't affect correctness for BFS."
    },
    {
        topic: "foundations",
        category: "Frontier & Explored Set",
        question: "If you run DFS on the office graph (start: corridor, goal: lab), what is the expansion order?",
        options: [
            "corridor, mail_room, storage, lab",
            "corridor, office_a, lab",
            "corridor, mail_room, office_a, office_b, storage, lab",
            "corridor, office_b, lab"
        ],
        correct: 0,
        explanation: "DFS with alphabetical tie-breaking: corridor's neighbours sorted = [mail_room, office_a, office_b]. Pick first unvisited: mail_room. mail_room's unvisited neighbours: storage. storage's unvisited neighbours: lab. lab = goal. Order: corridor, mail_room, storage, lab."
    },
    {
        topic: "foundations",
        category: "Search Metrics",
        question: "On the office graph, BFS expands corridor, mail_room, office_a, office_b, storage, lab. Why are more nodes expanded than DFS?",
        options: [
            "BFS is buggy",
            "BFS explores all nodes at each depth level before going deeper, so it visits breadth-first. DFS went deep through mail_room->storage->lab and found the goal without needing to explore all rooms.",
            "BFS uses more memory",
            "BFS is always worse than DFS"
        ],
        correct: 1,
        explanation: "BFS explores level-by-level: depth 0 (corridor), depth 1 (mail_room, office_a, office_b), depth 2 (storage, lab). It can't skip ahead. DFS dived into the mail_room branch and happened to find lab quickly via corridor->mail_room->storage->lab."
    },

    // ===== GROUP 2: SEARCH BEHAVIOUR (20 questions) =====
    // DFS vs BFS
    {
        topic: "search",
        category: "DFS vs BFS",
        question: "What data structure does DFS use for its frontier?",
        options: [
            "Queue (FIFO)",
            "Stack (LIFO)",
            "Min-heap (priority queue)",
            "Sorted array"
        ],
        correct: 1,
        explanation: "DFS uses a stack (Last-In-First-Out). The most recently discovered node is explored first, causing the search to go deep before backtracking. In code, this means peek/pop from the end of a list."
    },
    {
        topic: "search",
        category: "DFS vs BFS",
        question: "DFS found path corridor -> mail_room -> storage -> lab (cost 11). BFS found corridor -> office_a -> lab (cost 10). Is DFS optimal?",
        options: [
            "Yes, DFS always finds the optimal path",
            "No, DFS is not optimal. It finds the first path by going deep, which is not necessarily the cheapest or shallowest.",
            "Yes, because DFS explored fewer nodes",
            "No, but it's always faster than BFS"
        ],
        correct: 1,
        explanation: "DFS is NOT optimal. It returns the first complete path it finds by diving deep, regardless of cost or depth. Here DFS found cost 11 while BFS found cost 10 (and UCS found the true optimal: cost 6 via office_b->lab)."
    },
    {
        topic: "search",
        category: "DFS vs BFS",
        question: "Is BFS optimal for graphs with uniform edge costs? What about non-uniform?",
        options: [
            "BFS is always optimal regardless of edge costs",
            "BFS is optimal when all edge costs are equal (finds shallowest = cheapest). Not optimal with varying costs.",
            "BFS is never optimal",
            "BFS is optimal only with a heuristic"
        ],
        correct: 1,
        explanation: "BFS finds the shallowest (fewest edges) path. When all costs are 1, shallowest = cheapest, so BFS is optimal. With varying costs, a deeper path can be cheaper (like UCS finding cost 6 vs BFS finding cost 10 on the office graph)."
    },
    {
        topic: "search",
        category: "DFS vs BFS",
        question: "What is the space complexity advantage of DFS over BFS?",
        options: [
            "DFS uses O(b*m) space where b=branching factor, m=max depth. BFS uses O(b^d) where d=solution depth.",
            "They use the same space",
            "BFS uses less space than DFS",
            "DFS uses O(1) space"

                subtitle: "Deep: Alternatives & Connections",
                points: [
                    "Planning IS graph search: states=fact-sets, edges=actions. Same frontier/visited/expansion concepts.",
                    "Backward (regression) planning: start from goal, work backwards. Efficient when goal is specific.",
                    "A* for planning: use planning heuristics (h_goal_count, h_add, h_ff) instead of BFS. Better for variable-cost actions.",
                    "PDDL: standard AI planning language. Separates domain (action schemas) from problem (objects, init, goal).",
                    "The assignment's JSON + ai9414 helpers encode the same STRIPS semantics as PDDL in a simpler format."
                ]
            }
        ]
    }
];

// ==================== QUIZ ENGINE ====================
let currentQuestion = 0;
let filteredQuestions = [...questions];
let answers = {};
let currentMode = 'quiz';
let currentFlash = 0;

function switchMode(mode) {
    currentMode = mode;
    document.getElementById('quiz-mode').style.display = mode === 'quiz' ? 'block' : 'none';
    document.getElementById('flashcard-mode').style.display = mode === 'flashcards' ? 'block' : 'none';
    document.getElementById('browse-mode').style.display = mode === 'browse' ? 'block' : 'none';
    document.querySelectorAll('.container > .nav-tabs .nav-tab').forEach(tab => {
        tab.classList.toggle('active', tab.textContent.toLowerCase().includes(mode));
    });
    if (mode === 'quiz') renderQuestion();
    if (mode === 'flashcards') renderFlashcard();
    if (mode === 'browse') renderBrowse();
}

function filterTopic(topic) {
    document.querySelectorAll('#topic-filter .nav-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.topic === topic);
    });
    if (topic === 'all') {
        filteredQuestions = [...questions];
    } else {
        filteredQuestions = questions.filter(q => q.topic === topic);
    }
    currentQuestion = 0;
    answers = {};
    renderQuestion();
}

function renderQuestion() {
    if (currentQuestion >= filteredQuestions.length) {
        showScore();
        return;
    }
    const q = filteredQuestions[currentQuestion];
    const qIdx = questions.indexOf(q);
    const answered = answers[qIdx] !== undefined;
    const selected = answers[qIdx];

    let html = `<div class="quiz-card">
        <div class="category">${q.category}</div>
        <div class="question">${q.question}</div>
        <div class="options">`;

    q.options.forEach((opt, i) => {
        let cls = 'option';
        if (answered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct';
            else if (i === selected && i !== q.correct) cls += ' incorrect';
        } else if (i === selected) {
            cls += ' selected';
        }
        html += `<div class="${cls}" onclick="selectOption(${i})">${opt}</div>`;
    });

    html += `</div><div class="explanation ${answered ? 'visible' : ''}">${q.explanation}</div></div>`;

    document.getElementById('quiz-content').innerHTML = html;
    document.getElementById('progress-text').textContent = `Question ${currentQuestion + 1} / ${filteredQuestions.length}`;
    document.getElementById('progress-fill').style.width = `${((currentQuestion + 1) / filteredQuestions.length) * 100}%`;
}

function selectOption(i) {
    const q = filteredQuestions[currentQuestion];
    const qIdx = questions.indexOf(q);
    if (answers[qIdx] !== undefined) return;
    answers[qIdx] = i;
    renderQuestion();
}

function nextQuestion() {
    if (currentQuestion < filteredQuestions.length - 1) {
        currentQuestion++;
        renderQuestion();
    } else {
        showScore();
    }
}

function prevQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
    }
}

function showScore() {
    let correct = 0;
    let total = 0;
    filteredQuestions.forEach(q => {
        const qIdx = questions.indexOf(q);
        if (answers[qIdx] !== undefined) {
            total++;
            if (answers[qIdx] === q.correct) correct++;
        }
    });
    const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
    let cls = pct >= 80 ? '' : pct >= 50 ? 'mid' : 'low';

    // Category breakdown
    const cats = {};
    filteredQuestions.forEach(q => {
        const qIdx = questions.indexOf(q);
        if (!cats[q.category]) cats[q.category] = { correct: 0, total: 0 };
        if (answers[qIdx] !== undefined) {
            cats[q.category].total++;
            if (answers[qIdx] === q.correct) cats[q.category].correct++;
        }
    });
    let breakdown = '';
    for (const [cat, data] of Object.entries(cats)) {
        if (data.total > 0) breakdown += `<div>${cat}: ${data.correct}/${data.total}</div>`;
    }

    document.getElementById('quiz-content').innerHTML = `
        <div class="score-display">
            <h2>Results</h2>
            <div class="score-num ${cls}">${pct}%</div>
            <div>${correct} / ${total} correct</div>
            <div class="score-breakdown">${breakdown}</div>
            <div class="btn-row" style="margin-top:24px">
                <button class="btn btn-reset" onclick="resetQuiz()">Retry</button>
            </div>
        </div>`;
}

function resetQuiz() {
    currentQuestion = 0;
    answers = {};
    renderQuestion();
}

// ==================== FLASHCARD ENGINE ====================
function renderFlashcard() {
    const f = flashcards[currentFlash];
    document.getElementById('flashcard-content').innerHTML = `
        <div class="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="front">${f.front}<div class="hint">Click to reveal</div></div>
            <div class="back">${f.back}</div>
        </div>`;
    document.getElementById('flash-progress').textContent = `Card ${currentFlash + 1} / ${flashcards.length}`;
}

function nextFlash() { currentFlash = (currentFlash + 1) % flashcards.length; renderFlashcard(); }
function prevFlash() { currentFlash = (currentFlash - 1 + flashcards.length) % flashcards.length; renderFlashcard(); }
function shuffleFlash() {
    for (let i = flashcards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
    }
    currentFlash = 0;
    renderFlashcard();
}

// ==================== BROWSE ENGINE ====================
function renderBrowse() {
    let html = '';
    browseTopics.forEach(topic => {
        html += `<div class="topic-section"><h3>${topic.title}</h3>`;
        topic.sections.forEach(sec => {
            html += `<h3 style="color:#a78bfa;font-size:1rem;margin-top:16px">${sec.subtitle}</h3><ul>`;
            sec.points.forEach(p => { html += `<li>${p}</li>`; });
            html += `</ul>`;
        });
        html += `</div>`;
    });
    document.getElementById('browse-mode').innerHTML = html;
}

// ==================== INIT ====================
renderQuestion();
</script>
