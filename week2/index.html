<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMP9414 Week 2 - Planning Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
            font-size: 17px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 1.8rem;
            color: #7cb7ff;
            margin-bottom: 8px;
        }
        header p { color: #888; font-size: 0.95rem; }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: #1a1a3e;
            border: 1px solid #333;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .nav-tab:hover { border-color: #7cb7ff; color: #7cb7ff; }
        .nav-tab.active { background: #7cb7ff; color: #0f0f23; border-color: #7cb7ff; font-weight: 600; }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1a1a3e;
            border-radius: 3px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7cb7ff, #a78bfa);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-text {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 16px;
        }

        /* Quiz card */
        .quiz-card {
            background: #1a1a3e;
            border: 1px solid #2a2a5a;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .quiz-card .category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a78bfa;
            margin-bottom: 12px;
        }
        .quiz-card .question {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 24px;
            color: #fff;
        }

        /* Options */
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            padding: 14px 18px;
            background: #0f0f23;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .option:hover { border-color: #7cb7ff; background: #151535; }
        .option.selected { border-color: #7cb7ff; background: #1a2a4a; }
        .option.correct { border-color: #4ade80; background: #0f2a1a; color: #4ade80; }
        .option.incorrect { border-color: #f87171; background: #2a0f0f; color: #f87171; }
        .option.show-correct { border-color: #4ade80; background: #0f2a1a; }
        .option.disabled { pointer-events: none; }

        /* Explanation */
        .explanation {
            margin-top: 20px;
            padding: 16px;
            background: #0f1a2a;
            border-left: 3px solid #7cb7ff;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
            line-height: 1.6;
            display: none;
            color: #ccc;
        }
        .explanation.visible { display: block; animation: fadeIn 0.3s ease; }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: center;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #7cb7ff; color: #0f0f23; }
        .btn-primary:hover { background: #5a9fee; }
        .btn-secondary { background: #2a2a5a; color: #ccc; }
        .btn-secondary:hover { background: #3a3a6a; }
        .btn-reset { background: #f87171; color: #fff; }
        .btn-reset:hover { background: #dc2626; }

        /* Score */
        .score-display {
            text-align: center;
            padding: 40px;
        }
        .score-display h2 { font-size: 2rem; color: #7cb7ff; margin-bottom: 12px; }
        .score-display .score-num { font-size: 3.5rem; font-weight: 700; color: #4ade80; margin: 16px 0; }
        .score-display .score-num.low { color: #f87171; }
        .score-display .score-num.mid { color: #fbbf24; }
        .score-breakdown { margin-top: 20px; font-size: 0.9rem; color: #aaa; }

        /* Topic section in browse mode */
        .topic-section { margin-bottom: 32px; }
        .topic-section h3 { color: #7cb7ff; margin-bottom: 12px; font-size: 1.1rem; }
        .topic-section ul { padding-left: 20px; }
        .topic-section li { margin-bottom: 8px; line-height: 1.5; color: #ccc; }
        .topic-section code { background: #2a2a5a; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }

        /* Flashcard mode */
        .flashcard {
            background: #1a1a3e;
            border: 1px solid #2a2a5a;
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .flashcard:hover { border-color: #7cb7ff; }
        .flashcard .front { font-size: 1.2rem; font-weight: 500; }
        .flashcard .back { font-size: 1rem; color: #4ade80; line-height: 1.6; display: none; }
        .flashcard.flipped .front { display: none; }
        .flashcard.flipped .back { display: block; }
        .flashcard .hint { font-size: 0.8rem; color: #666; margin-top: 12px; }

        /* Slide mode */
        .slide {
            background: #1a1a3e;
            border: 1px solid #2a2a5a;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        .slide h2 {
            font-size: 1.4rem;
            color: #7cb7ff;
            margin-bottom: 16px;
            border-bottom: 1px solid #2a2a5a;
            padding-bottom: 12px;
        }
        .slide h3 { font-size: 1.1rem; color: #a78bfa; margin: 16px 0 8px; }
        .slide p { line-height: 1.7; margin-bottom: 12px; color: #ccc; }
        .slide ul, .slide ol { padding-left: 20px; margin-bottom: 12px; }
        .slide li { margin-bottom: 6px; line-height: 1.6; color: #ccc; }
        .slide .highlight {
            background: #0f1a2a;
            border-left: 3px solid #7cb7ff;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin: 12px 0;
            font-size: 0.95rem;
        }
        .slide .formula {
            background: #0f1a2a;
            border: 1px solid #2a2a5a;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 12px 0;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #4ade80;
        }
        .slide table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 0.9rem;
        }
        .slide th, .slide td {
            padding: 8px 12px;
            border: 1px solid #2a2a5a;
            text-align: left;
        }
        .slide th { background: #0f1a2a; color: #7cb7ff; }
        .slide td { color: #ccc; }
        .slide .slide-num { font-size: 0.75rem; color: #555; text-align: right; }

        /* Responsive */
        @media (min-width: 768px) {
            body { font-size: 19px; }
            .quiz-card .question { font-size: 1.4rem; }
            .option { font-size: 1.1rem; }
            .explanation { font-size: 1.05rem; }
            .slide p, .slide li { font-size: 1.1rem; }
            .slide h2 { font-size: 1.7rem; }
            .slide h3 { font-size: 1.25rem; }
            .slide .highlight { font-size: 1.1rem; }
            .slide .formula { font-size: 1.25rem; }
            .slide table { font-size: 1.05rem; }
            .flashcard .front { font-size: 1.4rem; }
            .flashcard .back { font-size: 1.15rem; }
            .topic-section li { font-size: 1.1rem; }
            .topic-section h3 { font-size: 1.2rem; }
            .nav-tab { font-size: 1rem; }
            .progress-text { font-size: 0.95rem; }
        }
        @media (max-width: 600px) {
            .container { padding: 12px; }
            .quiz-card { padding: 20px; }
            header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>COMP9414 Week 2: Planning</h1>
        <p>Interactive quiz to master key concepts</p>
    </header>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="switchMode('slides')">Slides</div>
        <div class="nav-tab" onclick="switchMode('quiz')">Quiz Mode</div>
        <div class="nav-tab" onclick="switchMode('flashcards')">Flashcards</div>
        <div class="nav-tab" onclick="switchMode('browse')">Browse Topics</div>
    </div>

    <div id="quiz-mode" style="display:none">
        <div class="nav-tabs" id="topic-filter" style="margin-bottom:16px">
            <div class="nav-tab active" data-topic="all" onclick="filterTopic('all')">All Topics</div>
            <div class="nav-tab" data-topic="motivation" onclick="filterTopic('motivation')">Why Planning?</div>
            <div class="nav-tab" data-topic="strips" onclick="filterTopic('strips')">STRIPS</div>
            <div class="nav-tab" data-topic="forward" onclick="filterTopic('forward')">Forward Planning</div>
            <div class="nav-tab" data-topic="limits" onclick="filterTopic('limits')">Limits & Extensions</div>
        </div>
        <div class="progress-text" id="progress-text">Question 1 / 25</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div id="quiz-content"></div>
        <div class="btn-row" id="quiz-buttons">
            <button class="btn btn-secondary" onclick="prevQuestion()">Previous</button>
            <button class="btn btn-primary" onclick="nextQuestion()">Next</button>
        </div>
    </div>

    <div id="flashcard-mode" style="display:none">
        <div class="progress-text" id="flash-progress">Card 1 / 20</div>
        <div id="flashcard-content"></div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="prevFlash()">Previous</button>
            <button class="btn btn-primary" onclick="nextFlash()">Next</button>
            <button class="btn btn-secondary" onclick="shuffleFlash()">Shuffle</button>
        </div>
    </div>

    <div id="browse-mode" style="display:none"></div>

    <div id="slides-mode">
        <div class="progress-text" id="slide-progress">Slide 1 / 20</div>
        <div id="slide-content"></div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="prevSlide()">Previous</button>
            <button class="btn btn-primary" onclick="nextSlide()">Next</button>
        </div>
    </div>
</div>

<script>
// ==================== QUIZ DATA ====================
const questions = [
    // WHY PLANNING?
    {
        topic: "motivation",
        category: "Why Planning?",
        question: "Why is simple path search (DFS/BFS/UCS) not enough for a delivery robot with locked doors?",
        options: [
            "Because the robot moves too slowly",
            "Because the state is more than just location — it includes objects, door states, and what the robot is carrying",
            "Because DFS can't handle graphs with cycles",
            "Because the goal is always unreachable"
        ],
        correct: 1,
        explanation: "Path search only considers location. Planning represents states as sets of facts (e.g. at(robot, corridor), locked(lab_door), handempty(robot)) and actions have preconditions and effects. The robot must get a key, unlock a door, pick up a parcel — not just navigate."
    },
    {
        topic: "motivation",
        category: "Why Planning?",
        question: "What is the key difference between a search problem and a planning problem?",
        options: [
            "Search uses graphs, planning uses trees",
            "Search finds paths through locations; planning finds sequences of actions that transform world states",
            "Planning is always faster than search",
            "Search uses heuristics, planning does not"
        ],
        correct: 1,
        explanation: "In search, states are locations and actions are movements. In planning, states are sets of facts about the world, actions have preconditions (what must be true) and effects (what changes), and the goal is a set of conditions to satisfy."
    },
    {
        topic: "motivation",
        category: "Why Planning?",
        question: "What assumptions does classical planning make about the environment?",
        options: [
            "Partially observable, stochastic, dynamic",
            "Fully observable, deterministic, static, closed-world",
            "Fully observable, stochastic, dynamic",
            "Partially observable, deterministic, static"
        ],
        correct: 1,
        explanation: "Classical planning assumes: fully observable (we know all facts), deterministic (actions have guaranteed outcomes), static (world only changes via our actions), and closed-world (anything not stated as true is false)."
    },
    {
        topic: "motivation",
        category: "Why Planning?",
        question: "What is the closed-world assumption?",
        options: [
            "The agent operates in a closed room",
            "Any fact not explicitly stated as true is assumed to be false",
            "The world never changes",
            "All doors in the environment are closed"
        ],
        correct: 1,
        explanation: "Under the closed-world assumption, if a fact is not in the current state, it is false. For example, if at(parcel, lab) is not in the state, then the parcel is NOT at the lab. This avoids having to list every false fact."
    },
    {
        topic: "motivation",
        category: "Why Planning?",
        question: "A planning problem P = (O, s0, g) consists of:",
        options: [
            "Operators, start state, goal conditions",
            "Objects, states, graphs",
            "Observations, sensors, goals",
            "Operators, search tree, goal node"
        ],
        correct: 0,
        explanation: "A planning problem is defined by: O = set of operators (action schemas with variables), s0 = initial state (set of facts), g = goal conditions (subset of facts that must be true). A plan is a sequence of actions that transforms s0 into a state satisfying g."
    },

    // STRIPS
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "What does STRIPS stand for?",
        options: [
            "Structured Transition Rules for Intelligent Problem Solving",
            "Stanford Research Institute Problem Solver",
            "State Transition and Reduction in Planning Systems",
            "Symbolic Transformation of Rules in Planning Scenarios"
        ],
        correct: 1,
        explanation: "STRIPS = Stanford Research Institute Problem Solver. It provides a restricted action language with simple preconditions and add/delete effects."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "In STRIPS, an action has three components. What are they?",
        options: [
            "Input, output, cost",
            "Preconditions, add list, delete list",
            "Start state, transition, end state",
            "Variables, constants, predicates"
        ],
        correct: 1,
        explanation: "Each STRIPS action has: Preconditions (facts that must be true for the action to apply), Add list (facts made true by the action), and Delete list (facts made false by the action). This is the action model — the planner's causal knowledge."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "What is the state transition rule in STRIPS?",
        options: [
            "Result(s, a) = s + Add(a)",
            "Result(s, a) = (s - Del(a)) + Add(a)",
            "Result(s, a) = Add(a) - Del(a)",
            "Result(s, a) = s - Del(a)"
        ],
        correct: 1,
        explanation: "Result(s, a) = (s - Del(a)) ∪ Add(a). First remove the delete list facts, then add the add list facts. All other facts persist (frame assumption)."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "When is an action applicable in STRIPS?",
        options: [
            "When the goal is satisfied",
            "When Pre(a) ⊆ s — all preconditions are in the current state",
            "When the add list is non-empty",
            "When no other action has been applied yet"
        ],
        correct: 1,
        explanation: "An action a is applicable in state s when Pre(a) ⊆ s — every precondition of the action is present in the current state. If any precondition is missing, the action cannot be applied."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "For the action move(robot, corridor, office_a), what are the preconditions?",
        options: [
            "at(robot, office_a), connected(corridor, office_a)",
            "at(robot, corridor), connected(corridor, office_a)",
            "at(robot, corridor), at(robot, office_a)",
            "connected(corridor, office_a) only"
        ],
        correct: 1,
        explanation: "To move from corridor to office_a, the robot must be at the corridor (at(robot, corridor)) and the rooms must be connected (connected(corridor, office_a)). The add list is {at(robot, office_a)} and the delete list is {at(robot, corridor)}."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "The robot applies pickup_parcel(robot, parcel, mail_room). Which facts should be deleted?",
        options: [
            "at(robot, mail_room)",
            "at(parcel, mail_room) and handempty(robot)",
            "connected(mail_room, corridor)",
            "locked(lab_door)"
        ],
        correct: 1,
        explanation: "After picking up the parcel: the parcel is no longer sitting in the mail room (delete at(parcel, mail_room)), and the robot's hand is no longer empty (delete handempty(robot)). The robot is still in the mail room, room connectivity and door locks are unchanged."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "What is the frame assumption?",
        options: [
            "All actions must be framed within a time window",
            "Facts not in the add or delete list persist unchanged",
            "The environment is bounded by physical walls",
            "Only one action can happen at a time"
        ],
        correct: 1,
        explanation: "The frame assumption says STRIPS updates only the facts named in the add and delete lists. Everything else stays the same. For example, after unlock_door: locked(lab_door) is removed, unlocked(lab_door) is added, but at(robot, corridor) and has(robot, keycard) persist."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "What is the difference between an operator and an action?",
        options: [
            "There is no difference",
            "An operator is a schema with variables; an action is a ground instance with specific values",
            "An operator deletes facts; an action adds facts",
            "Operators are used in BFS; actions in DFS"
        ],
        correct: 1,
        explanation: "An operator (schema) uses variables: move(?robot, ?from, ?to). An action (ground instance) has specific values: move(robot, corridor, office_a). The operator defines the pattern; actions are the concrete instances that can be applied."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "For unlock_door(robot, keycard, lab_door, corridor, lab), what are the effects?",
        options: [
            "Add: unlocked(lab_door); Delete: locked(lab_door)",
            "Add: at(robot, lab); Delete: at(robot, corridor)",
            "Add: has(robot, keycard); Delete: handempty(robot)",
            "Delete all facts not mentioned in the action"
        ],
        correct: 0,
        explanation: "unlock_door adds unlocked(lab_door) and deletes locked(lab_door). The robot stays where it is (corridor), still has the keycard. After this action, crossing from corridor to lab becomes applicable."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "Suppose the state includes at(robot, corridor), has(robot, keycard), locked(lab_door). After applying unlock_door, which update is correct?",
        options: [
            "Add unlocked(lab_door); delete locked(lab_door)",
            "Add at(robot, lab); delete at(robot, corridor)",
            "Add has(robot, keycard); delete handempty(robot)",
            "Delete all facts not mentioned in the action"
        ],
        correct: 0,
        explanation: "STRIPS updates only the facts named in the add and delete lists. locked(lab_door) is removed, unlocked(lab_door) is added. at(robot, corridor) persists, the robot still has the keycard."
    },
    {
        topic: "strips",
        category: "STRIPS Representation",
        question: "What does PDDL stand for and how does it relate to STRIPS?",
        options: [
            "Planning Domain Definition Language — a standard text format using the same preconditions/effects idea",
            "Parallel Decision and Deduction Logic",
            "Probabilistic Domain Description Language",
            "Planning Data Description Library"
        ],
        correct: 0,
        explanation: "PDDL (Planning Domain Definition Language) is a standard text format for writing planning domains and problems. It uses the same idea as STRIPS: preconditions plus effects (add/delete). The same domain can be described as STRIPS operators, PDDL actions, or Python data structures."
    },

    // FORWARD PLANNING
    {
        topic: "forward",
        category: "Forward State-Space Planning",
        question: "What is forward state-space planning?",
        options: [
            "Start from the goal and work backwards",
            "Start from the initial state, generate applicable actions, apply them to get successor states, stop when goal is satisfied",
            "Try all possible action orderings simultaneously",
            "Use heuristics to skip directly to the goal"
        ],
        correct: 1,
        explanation: "Forward planning starts from s0, generates all applicable actions, applies each to get successor states, and searches (e.g. with BFS) until a state satisfying the goal is found. A plan is a path through the space of symbolic states."
    },
    {
        topic: "forward",
        category: "Forward State-Space Planning",
        question: "In forward planning as BFS, what does each node in the search tree represent?",
        options: [
            "A single fact",
            "A state (set of facts) plus the plan prefix to reach it",
            "An operator schema",
            "A heuristic estimate"
        ],
        correct: 1,
        explanation: "Each node is a (state, plan-prefix) pair. The state is a set of facts, and the plan prefix is the sequence of actions taken so far. BFS expands states layer by layer, finding a shortest action sequence."
    },
    {
        topic: "forward",
        category: "Forward State-Space Planning",
        question: "From the initial state with at(robot, corridor) and locked(lab_door), which movement is NOT applicable?",
        options: [
            "move(robot, corridor, office_a)",
            "move(robot, corridor, mail_room)",
            "move(robot, corridor, lab)",
            "move(robot, corridor, office_b)"
        ],
        correct: 2,
        explanation: "move(robot, corridor, lab) requires unlocked(lab_door) as a precondition, but the lab door is locked. The other three moves only need at(robot, corridor) and connected(corridor, X), which are satisfied."
    },
    {
        topic: "forward",
        category: "Forward State-Space Planning",
        question: "After expanding the initial state with BFS, which set best describes the next frontier?",
        options: [
            "States reached by moving to office A, mail room, and office B",
            "States reached by picking up the keycard, parcel, and lab door",
            "Only the state reached by moving to the lab",
            "Every possible state in the whole planning domain"
        ],
        correct: 0,
        explanation: "BFS expands all states at depth 1 before depth 2. From the initial state, the applicable movement actions take the robot to office A, mail room, and office B. The lab is not on the frontier because the locked-door precondition blocks that move."
    },
    {
        topic: "forward",
        category: "Forward State-Space Planning",
        question: "Why does a naive route (corridor -> mail_room -> corridor -> lab) fail for the delivery problem?",
        options: [
            "The corridor doesn't connect to the mail room",
            "The planner must handle preconditions: locked door needs keycard, picking up parcel removes handempty, getting keycard first avoids extra trips",
            "BFS cannot find paths longer than 5 steps",
            "The parcel is too heavy"
        ],
        correct: 1,
        explanation: "The lab door is locked (need keycard to unlock). Picking up the parcel removes handempty(robot). Getting the keycard first (from office_a) avoids having to put the parcel down to pick up the keycard later. The planner must reason about these interactions."
    },

// ==================== QUIZ LOGIC ====================
let currentQuestion = 0;
let answers = {};
let filteredQuestions = [...questions];
let currentTopic = 'all';
let currentFlash = 0;
let shuffledFlash = [...flashcards];

function filterTopic(topic) {
    currentTopic = topic;
    document.querySelectorAll('#topic-filter .nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`#topic-filter [data-topic="${topic}"]`).classList.add('active');
    if (topic === 'all') {
        filteredQuestions = [...questions];
    } else {
        filteredQuestions = questions.filter(q => q.topic === topic);
    }
    currentQuestion = 0;
    answers = {};
    renderQuiz();
}

function renderQuiz() {
    if (filteredQuestions.length === 0) {
        document.getElementById('quiz-content').innerHTML = '<div class="quiz-card"><p>No questions for this topic.</p></div>';
        return;
    }
    const total = filteredQuestions.length;
    const answered = Object.keys(answers).length;

    if (answered === total && answered > 0) {
        showScore();
        return;
    }

    const q = filteredQuestions[currentQuestion];
    document.getElementById('progress-text').textContent = `Question ${currentQuestion + 1} / ${total}`;
    document.getElementById('progress-fill').style.width = `${((currentQuestion + 1) / total) * 100}%`;

    const hasAnswered = answers[currentQuestion] !== undefined;
    const optionsHtml = q.options.map((opt, i) => {
        let cls = 'option';
        if (hasAnswered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct';
            else if (i === answers[currentQuestion] && i !== q.correct) cls += ' incorrect';
        }
        return `<div class="${cls}" onclick="selectAnswer(${i})">${opt}</div>`;
    }).join('');

    document.getElementById('quiz-content').innerHTML = `
        <div class="quiz-card">
            <div class="category">${q.category}</div>
            <div class="question">${q.question}</div>
            <div class="options">${optionsHtml}</div>
            <div class="explanation ${hasAnswered ? 'visible' : ''}">${q.explanation}</div>
        </div>
    `;
}

function selectAnswer(idx) {
    if (answers[currentQuestion] !== undefined) return;
    answers[currentQuestion] = idx;
    renderQuiz();
}

function nextQuestion() {
    if (currentQuestion < filteredQuestions.length - 1) {
        currentQuestion++;
        renderQuiz();
    } else if (Object.keys(answers).length === filteredQuestions.length) {
        showScore();
    }
}

function prevQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        renderQuiz();
    }
}

function showScore() {
    const total = filteredQuestions.length;
    let correct = 0;
    for (let i = 0; i < total; i++) {
        if (answers[i] === filteredQuestions[i].correct) correct++;
    }
    const pct = Math.round((correct / total) * 100);
    let cls = pct >= 80 ? '' : pct >= 50 ? 'mid' : 'low';

    document.getElementById('quiz-content').innerHTML = `
        <div class="score-display">
            <h2>Quiz Complete!</h2>
            <div class="score-num ${cls}">${correct}/${total}</div>
            <p>${pct}% correct</p>
            <div class="score-breakdown">
                ${pct >= 80 ? 'Excellent! You have a strong grasp of the material.' :
                  pct >= 50 ? 'Good effort! Review the topics you missed.' :
                  'Keep studying! Try the flashcards to reinforce concepts.'}
            </div>
            <div class="btn-row" style="margin-top:24px">
                <button class="btn btn-primary" onclick="resetQuiz()">Try Again</button>
                <button class="btn btn-secondary" onclick="reviewMissed()">Review Missed</button>
            </div>
        </div>
    `;
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-text').textContent = `Completed: ${correct}/${total} correct`;
}

function resetQuiz() {
    answers = {};
    currentQuestion = 0;
    renderQuiz();
}

function reviewMissed() {
    const missed = [];
    for (let i = 0; i < filteredQuestions.length; i++) {
        if (answers[i] !== filteredQuestions[i].correct) missed.push(i);
    }
    if (missed.length === 0) { resetQuiz(); return; }
    currentQuestion = missed[0];
    answers = {};
    renderQuiz();
}

// ==================== FLASHCARD LOGIC ====================
function renderFlashcard() {
    const f = shuffledFlash[currentFlash];
    document.getElementById('flash-progress').textContent = `Card ${currentFlash + 1} / ${shuffledFlash.length}`;
    document.getElementById('flashcard-content').innerHTML = `
        <div class="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="front">${f.front}<div class="hint">Click to reveal answer</div></div>
            <div class="back">${f.back.replace(/\n/g, '<br>')}</div>
        </div>
    `;
}

function nextFlash() {
    currentFlash = (currentFlash + 1) % shuffledFlash.length;
    renderFlashcard();
}

function prevFlash() {
    currentFlash = (currentFlash - 1 + shuffledFlash.length) % shuffledFlash.length;
    renderFlashcard();
}

function shuffleFlash() {
    for (let i = shuffledFlash.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledFlash[i], shuffledFlash[j]] = [shuffledFlash[j], shuffledFlash[i]];
    }
    currentFlash = 0;
    renderFlashcard();
}

// ==================== SLIDES LOGIC ====================
let currentSlide = 0;

function renderSlide() {
    const s = slides[currentSlide];
    document.getElementById('slide-progress').textContent = `Slide ${currentSlide + 1} / ${slides.length}`;
    document.getElementById('slide-content').innerHTML = `
        <div class="slide">
            <h2>${s.title}</h2>
            ${s.content}
            <div class="slide-num">Slide ${currentSlide + 1} / ${slides.length}</div>
        </div>
    `;
}

function nextSlide() {
    if (currentSlide < slides.length - 1) {
        currentSlide++;
        renderSlide();
    }
}

function prevSlide() {
    if (currentSlide > 0) {
        currentSlide--;
        renderSlide();
    }
}

// ==================== BROWSE LOGIC ====================
function renderBrowse() {
    document.getElementById('browse-mode').innerHTML = browseContent;
}

// ==================== MODE SWITCHING ====================
function switchMode(mode) {
    document.querySelectorAll('.nav-tabs:first-of-type .nav-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');

    document.getElementById('quiz-mode').style.display = mode === 'quiz' ? 'block' : 'none';
    document.getElementById('flashcard-mode').style.display = mode === 'flashcards' ? 'block' : 'none';
    document.getElementById('browse-mode').style.display = mode === 'browse' ? 'block' : 'none';
    document.getElementById('slides-mode').style.display = mode === 'slides' ? 'block' : 'none';

    if (mode === 'quiz') renderQuiz();
    if (mode === 'flashcards') renderFlashcard();
    if (mode === 'browse') renderBrowse();
    if (mode === 'slides') renderSlide();
}

// ==================== KEYBOARD NAVIGATION ====================
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') {
        if (document.getElementById('slides-mode').style.display !== 'none') nextSlide();
        else if (document.getElementById('quiz-mode').style.display !== 'none') nextQuestion();
        else if (document.getElementById('flashcard-mode').style.display !== 'none') nextFlash();
    } else if (e.key === 'ArrowLeft') {
        if (document.getElementById('slides-mode').style.display !== 'none') prevSlide();
        else if (document.getElementById('quiz-mode').style.display !== 'none') prevQuestion();
        else if (document.getElementById('flashcard-mode').style.display !== 'none') prevFlash();
    } else if (e.key === ' ' && document.getElementById('flashcard-mode').style.display !== 'none') {
        e.preventDefault();
        const card = document.querySelector('.flashcard');
        if (card) card.classList.toggle('flipped');
    }
});

// ==================== INIT ====================
renderSlide();
</script>
